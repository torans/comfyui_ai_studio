name: Build Desktop Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build ${{ matrix.platform.name }} Bundle
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            runner: windows-latest
            artifact_name: beikuman-ai-studio-windows
            rust_target: ""
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - name: macOS Intel
            runner: macos-latest
            artifact_name: beikuman-ai-studio-macos-intel
            rust_target: x86_64-apple-darwin
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - name: macOS Apple Silicon
            runner: macos-latest
            artifact_name: beikuman-ai-studio-macos-apple-silicon
            rust_target: aarch64-apple-darwin
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        if: matrix.platform.rust_target == ''

      - name: Setup Rust target
        uses: dtolnay/rust-toolchain@stable
        if: matrix.platform.rust_target != ''
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Beikuman AI Studio {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/v') && 'Desktop installers for Beikuman AI Studio.' || '' }}
          generateReleaseNotes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          args: ${{ matrix.platform.rust_target != '' && format('--target {0}', matrix.platform.rust_target) || '' }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}-${{ github.sha }}
          if-no-files-found: error
          path: ${{ matrix.platform.artifact_paths }}
